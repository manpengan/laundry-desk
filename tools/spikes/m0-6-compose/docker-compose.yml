version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: laundry-postgres-spike
    environment:
      POSTGRES_DB: laundry_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password # 仅限本地 / LOCAL ONLY: mock credential for local development spike
    ports:
      - "8543:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata-spike:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laundry_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-edge-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: laundry-mock-edge-server-spike
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: laundry_app
      DB_PASSWORD: app_secure_password # 仅限本地 / LOCAL ONLY: mock app role credential
      DB_NAME: laundry_v2
      PORT: "3000"
    ports:
      - "8080:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-spike:
