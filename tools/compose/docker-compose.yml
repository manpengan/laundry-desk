services:
  postgres:
    image: postgres:16-alpine
    container_name: laundry-postgres-v2
    environment:
      POSTGRES_DB: laundry_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password # LOCAL ONLY
    ports:
      - "8543:5432"
    volumes:
      - ./bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
      - pgdata-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laundry_v2"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    image: laundry-v2-server-integration
    command: ["bash", "tools/compose/migrate-v2.sh"]
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: laundry_v2
      SUPERUSER_DATABASE_URL: postgresql://postgres:postgres_secure_password@postgres:5432/laundry_v2
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    image: laundry-v2-server-integration
    command: ["node", "tools/compose/seed-v2.mjs"]
    environment:
      DATABASE_ADMIN_URL: postgresql://postgres:postgres_secure_password@postgres:5432/laundry_v2
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  server:
    image: laundry-v2-server-integration
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE_URL: postgresql://laundry_app:app_secure_password@postgres:5432/laundry_v2
      DATABASE_ADMIN_URL: postgresql://postgres:postgres_secure_password@postgres:5432/laundry_v2
      HOST: 0.0.0.0
      PORT: "8787"
      CORS_ORIGIN: http://127.0.0.1:5173,http://localhost:5173
    ports:
      - "8787:8787"
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:8787/health'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata-v2:
